<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Smart AI Master Pro</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>🧠 Smart AI Master Pro</h1>

    <!-- Chat Window -->
    <div id="chat-window">
        <!-- Messages will appear here -->
    </div>

    <!-- Input area -->
    <div class="input-area">
        <input type="text" id="question" placeholder="প্রশ্ন লিখুন..." autocomplete="off">
        <button onclick="ask()">প্রশ্ন করো</button>
    </div>

    <!-- Teach area (hidden by default) -->
    <div id="teach-box" style="display:none;">
        <textarea id="teach-answer" placeholder="উত্তর লিখুন..."></textarea>
        <button onclick="teach()">শিখাও</button>
    </div>
</div>

<script>
// Function to display messages in chat window
function addMessage(sender, text) {
    const chat = document.getElementById("chat-window");
    const message = document.createElement("div");
    message.className = sender === "user" ? "message user" : "message ai";
    message.innerText = text;
    chat.appendChild(message);
    chat.scrollTop = chat.scrollHeight; // scroll to bottom
    saveHistory(sender, text); // save chat history
}

// Save chat history to localStorage
function saveHistory(sender, text) {
    let history = JSON.parse(localStorage.getItem("chat_history") || "[]");
    history.push({sender, text});
    localStorage.setItem("chat_history", JSON.stringify(history));
}

// Load chat history from localStorage
function loadHistory() {
    let history = JSON.parse(localStorage.getItem("chat_history") || "[]");
    history.forEach(msg => addMessage(msg.sender, msg.text));
}

// Ask question to server
function ask() {
    let question = document.getElementById("question").value;
    if (!question.trim()) return;
    addMessage("user", question);
    document.getElementById("question").value = "";

    fetch("/ask", {
        method: "POST",
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question})
    })
    .then(res => res.json())
    .then(data => {
        addMessage("ai", data.answer);
        if (data.answer.includes("আমি এখনো জানি না")) {
            document.getElementById("teach-box").style.display = "block";
        } else {
            document.getElementById("teach-box").style.display = "none";
        }
    });
}

// Teach new answer
function teach() {
    let question = document.getElementById("question").value;
    let answer = document.getElementById("teach-answer").value;
    if (!question || !answer) return;

    fetch("/teach", {
        method: "POST",
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question, answer})
    })
    .then(res => res.json())
    .then(data => {
        // Hide teach box silently without alert
        document.getElementById("teach-box").style.display = "none";
        document.getElementById("teach-answer").value = "";
        addMessage("ai", "✅ নতুন তথ্য সংরক্ষিত হয়েছে।");
    });
}

// Load previous chat history
loadHistory();
</script>
</body>
</html>
